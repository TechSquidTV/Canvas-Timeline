version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    versioning-strategy: increase-if-necessary
    groups:
      astro-cloudflare:
        patterns:
          - 'astro'
          - 'astro-*'
          - '@astrojs/*'
          - '@cloudflare/*'
          - 'wrangler'
          - 'workerd'
        update-types:
          - 'patch'
          - 'minor'
      sentry:
        patterns:
          - '@sentry/*'
        update-types:
          - 'patch'
          - 'minor'
      mediabunny:
        patterns:
          - 'mediabunny'
          - '@mediabunny/*'
        update-types:
          - 'patch'
          - 'minor'
      vite-tooling:
        patterns:
          - 'vite-plus'
          - '@voidzero-dev/*'
          - 'vitest'
          - '@vitest/*'
        update-types:
          - 'patch'
          - 'minor'
