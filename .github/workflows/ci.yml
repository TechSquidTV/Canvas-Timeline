name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  PACKAGE_LINE_COVERAGE_MINIMUM: 80

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1.15.0
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Lint pull request title
        run: |
          printf '%s\n' "${{ github.event.pull_request.title }}" | vp exec commitlint --verbose

      - name: Lint commit messages
        run: vp run commitlint -- --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }}

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1.15.0
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: node_modules/.vite/task-cache
          # Quality and build save in parallel, so scope primary keys by job while
          # keeping restore keys broad enough to reuse prior Vite Task caches.
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-

      - name: Run quality checks
        run: vp run ci:quality

      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6.1.0
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}

  build:
    name: Build and Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_SPONSORS_TOKEN: ${{ secrets.GITHUB_SPONSORS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1.15.0
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: node_modules/.vite/task-cache
          # Quality and build save in parallel, so scope primary keys by job while
          # keeping restore keys broad enough to reuse prior Vite Task caches.
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-

      - name: Build packages and apps
        run: vp run repo:build

      - name: Validate built publishable packages
        run: vp run repo:package:validate

      - name: Upload docs build
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs-build
          path: apps/www/dist/client
          if-no-files-found: error
          retention-days: 1

      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6.1.0
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    permissions:
      contents: read
      issues: write

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PROJECT_NAME: canvas-timeline-www

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1.15.0
        with:
          node-version: '24'
          run-install: false

      - name: Download docs build
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs-build
          path: apps/www/dist/client

      - name: Enable pnpm
        run: corepack enable

      - name: Deploy production docs to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy-production
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.107.0'
          packageManager: pnpm
          workingDirectory: apps/www
          command: pages deploy dist/client --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=main

      - name: Deploy preview docs to Cloudflare Pages
        if: github.event_name == 'pull_request' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        id: deploy-preview
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.107.0'
          packageManager: pnpm
          workingDirectory: apps/www
          command: pages deploy dist/client --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.head_ref }}

      - name: Comment docs preview URL
        if: github.event_name == 'pull_request' && steps.deploy-preview.conclusion == 'success'
        continue-on-error: true
        env:
          DEPLOYMENT_URL: ${{ steps.deploy-preview.outputs.deployment-url }}
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.deploy-preview.outputs.pages-deployment-alias-url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          comment_marker='<!-- canvas-timeline-www-preview -->'
          preview_url="${PREVIEW_URL:-$DEPLOYMENT_URL}"
          body="$(printf '%s\n### Docs preview deployed\n\nPreview: %s\n\nLatest deployment: %s' \
            "$comment_marker" \
            "$preview_url" \
            "$DEPLOYMENT_URL")"

          comment_id="$(
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq ".[] | select(.body | startswith(\"$comment_marker\")) | .id" \
              | head -n 1
          )"

          if [ -n "$comment_id" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${comment_id}" \
              -f body="$body"
          else
            gh api \
              --method POST \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="$body"
          fi
